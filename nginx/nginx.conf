upstream svc_auth {
    server intesahr-auth:8001;
}

upstream svc_recruiting {
    server intesahr-recruiting:8002;
}

upstream svc_admin {
    server intesahr-admin:8003;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 100M;

    # ─── Auth Service ────────────────────────────────────────────────────────────
    location /api/auth/ {
        proxy_pass http://svc_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Recruiting Service ───────────────────────────────────────────────────────
    location /api/job/ {
        proxy_pass http://svc_recruiting;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/candidates/ {
        proxy_pass http://svc_recruiting;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/interview/ {
        proxy_pass http://svc_recruiting;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /api/dashboard/ {
        proxy_pass http://svc_recruiting;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static file serving (uploaded files stored in svc-recruiting)
    location /files/ {
        proxy_pass http://svc_recruiting;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Admin Service ────────────────────────────────────────────────────────────
    location /api/admin/ {
        proxy_pass http://svc_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/settings/ {
        proxy_pass http://svc_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── React SPA ───────────────────────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}
